env:
  _target_: auto_atom.runtime.ComponentRegistry.register_env
  name: mujoco_pick_place_demo
  env:
    _target_: auto_atom.sim.basis.mujoco_env.UnifiedMujocoEnv
    config:
      _target_: auto_atom.sim.basis.mujoco_env.EnvConfig
      model_path: third_party/xml/scene_pick_place_demo.xml
      arm_mode: single
      enabled_sensors:
        - pose
        - joint_position
      sim_freq: 500
      update_freq: 20

backend: auto_atom.sim.backend.mujoco_backend.build_mujoco_backend

task:
  env_name: mujoco_pick_place_demo
  simulator: mujoco
  seed: 0
  stages:
    - name: pick_source
      object: source_block
      operation: pick
      operator: arm
      param:
        pre_move:
          - position: [0.0, 0.0, 0.12]
            orientation: [-0.70710678, 0.70710678, 0.0, 0.0]
            reference: object_world
          - position: [0.0, 0.0, 0.006]
            orientation: [-0.70710678, 0.70710678, 0.0, 0.0]
            reference: object_world
        post_move:
          - position: [1.0, -5.6, 0.98]
            orientation: [-0.70710678, 0.70710678, 0.0, 0.0]
            reference: world
        eef:
          close: true
    - name: place_source
      object: target_pedestal
      operation: place
      operator: arm
      param:
        pre_move:
          - position: [0.0, 0.0, 0.12]
            orientation: [-0.70710678, 0.70710678, 0.0, 0.0]
            reference: object_world
          - position: [0.0, 0.0, 0.058]
            orientation: [-0.70710678, 0.70710678, 0.0, 0.0]
            reference: object_world
        post_move:
          - position: [0.0, 0.0, 0.16]
            orientation: [-0.70710678, 0.70710678, 0.0, 0.0]
            reference: object_world
        eef:
          close: false

operators:
  - type: mujoco
    name: arm
