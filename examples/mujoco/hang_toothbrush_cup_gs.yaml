defaults:
  - hang_toothbrush_cup
  - robotiq_gs
  - _self_

gs_dir: assets/gs/scenes/hang_toothbrush_cup

env:
  env:
    _target_: auto_atom.basis.mjc.gs_mujoco_env.GSUnifiedMujocoEnv
    config:
      _target_: auto_atom.basis.mjc.gs_mujoco_env.GSEnvConfig
      model_path: assets/xmls/scenes/hang_toothbrush_cup/demo_gs.xml
      cameras:
        - name: front
          width: 640
          height: 480
          enable_color: true
          enable_depth: true
          enable_mask: false
          enable_heat_map: false
      viewer:
        lookat: [0.5, 0.14, 0.1]
        distance: 0.8
        azimuth: 135
        elevation: -28
        hold_seconds: 3.0
      gaussian_render:
        background_ply: assets/gs/backgrounds/example.ply
        body_gaussians:
          rack_gs:           ${gs_dir}/rack.ply
          toothbrush_cup_gs: ${gs_dir}/toothbrush_cup.ply
