env:
  _target_: auto_atom.runtime.ComponentRegistry.register_env
  name: open_drawer
  env:
    _target_: auto_atom.basis.mujoco_env.UnifiedMujocoEnv
    config:
      _target_: auto_atom.basis.mujoco_env.EnvConfig
      model_path: assets/xmls/scenes/open_close_drawer/demo.xml
      operators:
        - name: arm
          arm_actuators: [act_root_x, act_root_y, act_root_z, act_root_rot_z, act_root_rot_y, act_root_rot_x]
          eef_actuators: [fingers_actuator]
          eef_output_name: eef
          pose_site: eef_pose
      enabled_sensors:
        - camera
        - pose
        - joint_position
        - joint_velocity
        - joint_effort
      sim_freq: 500
      update_freq: 25
      mask_objects: ["handle", "drawer"]
      operations: ["pull"]
      cameras:
        - name: hand_cam
          width: 640
          height: 480
          enable_color: true
          enable_depth: true
          enable_mask: false
          enable_heat_map: false
          parent_frame: eef_pose
        - name: front_cam
          width: 640
          height: 480
          enable_color: true
          enable_depth: true
          enable_mask: false
          enable_heat_map: false
        - name: side_cam
          width: 640
          height: 480
          enable_color: true
          enable_depth: true
          enable_mask: false
          enable_heat_map: false
      # viewer:
      #   lookat: [0.0, 0.04, 0.12]
      #   distance: 0.75
      #   azimuth: 155
      #   elevation: -22
      #   step_delay: 0.025
      #   hold_seconds: 1.0

backend: auto_atom.backend.mjc.mujoco_backend.build_mujoco_backend

task:
  env_name: open_drawer
  seed: 42
  stages:
    # Pull the handle to open the drawer.
    # Gripper is horizontal (rot_x=pi/2): points in +Y toward cabinet, fingers in ±Z (one up, one down).
    # EEF site world pos at ctrl start: ~(0, -0.051, 0.15); handle closed: (0, 0.049, 0.132).
    # EEF orientation for horizontal +Y grasp: [-0.5, 0.5, 0.5, 0.5] (x,y,z,w).
    - name: pull_open
      object: handle
      operation: pull
      operator: arm
      param:
        pre_move:
          # Step 1: align with handle height (Z drops from 0.15 to 0.132), stay 10 cm in front
          - position: [0.0, -0.10, 0.0]
            orientation: [-0.5, 0.5, 0.5, 0.5]
            reference: object_world
          # Step 2: advance to grasp position �� EEF at handle center in Y so finger
          #         pads (±42 mm in Z) straddle the handle (±15 mm in Z) and can close on it
          - position: [0.0, 0.0, 0.0]
            orientation: [-0.5, 0.5, 0.5, 0.5]
            reference: object_world
        eef:
          close: true
        post_move:
          # Pull back 12 cm in −Y (world) to fully open the drawer (joint range 0 → −0.12 m)
          - position: [0.0, -0.12, 0.0]
            orientation: [-0.5, 0.5, 0.5, 0.5]
            reference: eef_world

operators:
  - name: arm
    role: manipulator
