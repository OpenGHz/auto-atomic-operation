env:
  _target_: auto_atom.runtime.ComponentRegistry.register_env
  name: cup_on_coaster
  env:
    _target_: auto_atom.basis.mujoco_env.UnifiedMujocoEnv
    config:
      _target_: auto_atom.basis.mujoco_env.EnvConfig
      model_path: assets/xmls/scenes/cup_on_coaster/demo.xml
      operators:
        - name: arm
          arm_actuators: [act_root_x, act_root_y, act_root_z, act_root_rot_z, act_root_rot_y, act_root_rot_x]
          eef_actuators: [fingers_actuator]
          eef_output_name: eef
          pose_site: eef_pose
          imu_acc: imu_acc
          imu_gyro: imu_gyro
          imu_quat: imu_quat
          pose_sensor_pos: global_gripper_pos
          pose_sensor_quat: global_gripper_quat
          tactile_prefixes: ["left_", "right_"]
      enabled_sensors:
        - camera
        - pose
        - tactile
        - joint_position
        - joint_velocity
        - joint_effort
      sim_freq: 500
      update_freq: 20
      mask_objects: ["cup", "coaster"]
      operations: ["pick", "place", "push", "pull", "press"]
      cameras:
        - name: hand_cam
          width: 640
          height: 480
          enable_color: true
          enable_depth: true
          enable_mask: false
          enable_heat_map: false
          parent_frame: eef_pose
        - name: front_cam
          width: 640
          height: 480
          enable_color: true
          enable_depth: true
          enable_mask: false
          enable_heat_map: false
        - name: side_cam
          width: 640
          height: 480
          enable_color: true
          enable_depth: true
          enable_mask: false
          enable_heat_map: false
      viewer:
        lookat: [0.04, 0.0, 0.09]
        distance: 0.6
        azimuth: 135
        elevation: -28
        step_delay: 0.03
        hold_seconds: 3.0

backend: auto_atom.backend.mjc.mujoco_backend.build_mujoco_backend

task:
  env_name: cup_on_coaster
  seed: 42
  randomization:
    cup:
      x: [-0.02, 0.02]
      y: [-0.02, 0.02]
      collision_radius: 0.04
    arm:
      x: [-0.01, 0.01]
      y: [-0.01, 0.01]
      collision_radius: 0.15
  stages:
    - name: pick_cup
      object: cup
      operation: pick
      operator: arm
      param:
        pre_move:
          # Approach high above the cup (center z=0.085)
          - position: [0.0, 0.0, 0.12]
            orientation: [-0.70710678, 0.70710678, 0.0, 0.0]
            reference: object_world
          # Descend to grasp height (0.006 above cup center)
          - position: [0.0, 0.0, 0.006]
            orientation: [-0.70710678, 0.70710678, 0.0, 0.0]
            reference: object_world
        post_move:
          - position: [0.0, 0.0, 0.2]
            orientation: [-0.70710678, 0.70710678, 0.0, 0.0]
            reference: eef_world
        eef:
          close: true

    - name: place_cup
      object: coaster
      operation: place
      operator: arm
      param:
        pre_move:
          # Approach above coaster (center z=0.07)
          - position: [0.0, 0.0, 0.15]
            orientation: [-0.70710678, 0.70710678, 0.0, 0.0]
            reference: object_world
          # Lower so cup bottom rests on coaster top
          # coaster top=0.08, cup center when placed=0.08+0.025=0.105
          # offset from coaster center = 0.105 - 0.07 = 0.035
          - position: [0.0, 0.0, 0.035]
            orientation: [-0.70710678, 0.70710678, 0.0, 0.0]
            reference: object_world
        post_move:
          - position: [0.0, 0.0, 0.18]
            orientation: [-0.70710678, 0.70710678, 0.0, 0.0]
            reference: object_world
        eef:
          close: false

operators:
  - name: arm
