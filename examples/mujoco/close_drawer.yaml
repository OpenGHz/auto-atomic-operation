env:
  _target_: auto_atom.runtime.ComponentRegistry.register_env
  name: close_drawer
  env:
    _target_: auto_atom.basis.mujoco_env.UnifiedMujocoEnv
    config:
      _target_: auto_atom.basis.mujoco_env.EnvConfig
      model_path: assets/xmls/scenes/open_close_drawer/demo.xml
      # Start with the drawer fully open (drawer_slide joint = -0.12 m)
      initial_joint_positions:
        drawer_slide: -0.12
      operators:
        - name: arm
          arm_actuators: [act_root_x, act_root_y, act_root_z, act_root_rot_z, act_root_rot_y, act_root_rot_x]
          eef_actuators: [fingers_actuator]
          eef_output_name: eef
          pose_site: eef_pose
      enabled_sensors:
        - camera
        - pose
        - joint_position
        - joint_velocity
        - joint_effort
      sim_freq: 500
      update_freq: 25
      mask_objects: ["handle", "drawer"]
      operations: ["pull"]
      cameras:
        - name: hand_cam
          width: 640
          height: 480
          enable_color: true
          enable_depth: true
          enable_mask: false
          enable_heat_map: false
          parent_frame: eef_pose
        - name: front_cam
          width: 640
          height: 480
          enable_color: true
          enable_depth: true
          enable_mask: false
          enable_heat_map: false
        - name: side_cam
          width: 640
          height: 480
          enable_color: true
          enable_depth: true
          enable_mask: false
          enable_heat_map: false
      # viewer:
      #   lookat: [0.0, 0.04, 0.12]
      #   distance: 0.75
      #   azimuth: 155
      #   elevation: -22
      #   step_delay: 0.025
      #   hold_seconds: 1.0

backend: auto_atom.backend.mjc.mujoco_backend.build_mujoco_backend

task:
  env_name: close_drawer
  seed: 42
  stages:
    # Grasp the handle and push the drawer closed.
    # Drawer starts fully open: joint=-0.12 m, handle world pos = (0, -0.071, 0.132).
    # Gripper is horizontal (rot_x=pi/2): points in +Y toward cabinet, fingers in ±Z.
    # EEF orientation for horizontal +Y grasp: [-0.5, 0.5, 0.5, 0.5] (x,y,z,w).
    - name: push_close
      object: handle
      operation: pull
      operator: arm
      param:
        pre_move:
          # Step 1: align with handle height, stay 10 cm in front
          - position: [0.0, -0.10, 0.0]
            orientation: [-0.5, 0.5, 0.5, 0.5]
            reference: object_world
          # Step 2: advance to grasp position — EEF at handle center in Y
          - position: [0.0, 0.0, 0.0]
            orientation: [-0.5, 0.5, 0.5, 0.5]
            reference: object_world
        eef:
          close: true
        post_move:
          # Push forward 12 cm in +Y (world) to fully close the drawer (joint range −0.12 → 0)
          - position: [0.0, 0.12, 0.0]
            orientation: [-0.5, 0.5, 0.5, 0.5]
            reference: eef_world

operators:
  - name: arm
    role: manipulator
