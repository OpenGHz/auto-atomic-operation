env:
  _target_: auto_atom.runtime.ComponentRegistry.register_env
  name: mujoco_pick_place_demo
  env:
    _target_: auto_atom.basis.mujoco_env.UnifiedMujocoEnv
    config:
      _target_: auto_atom.basis.mujoco_env.EnvConfig
      model_path: assets/xmls/scenes/pick_and_place/demo.xml
      operators:
        - name: arm
          arm_actuators: [act_root_x, act_root_y, act_root_z, act_root_rot_z, act_root_rot_y, act_root_rot_x]
          eef_actuators: [fingers_actuator]
          eef_output_name: eef
          pose_site: eef_pose
          imu_acc: imu_acc
          imu_gyro: imu_gyro
          imu_quat: imu_quat
          pose_sensor_pos: global_gripper_pos
          pose_sensor_quat: global_gripper_quat
          tactile_prefixes: ["left_", "right_"]
      enabled_sensors:
        - camera
        - pose
        - tactile
        - joint_position
        - joint_velocity
        - joint_effort
      sim_freq: 500
      update_freq: 50
      mask_objects: ["source_block", "target_pedestal"]
      operations: ["pick", "place", "push", "pull", "press"]
      # interests:
      #   - ["source_block", "target_pedestal"]
      #   - ["pick", "place"]
      cameras:
        - name: hand_cam
          width: 1280
          height: 720
          enable_color: true
          enable_depth: true
          enable_mask: false
          enable_heat_map: true
          parent_frame: eef_pose
        - name: front_cam
          width: 1280
          height: 720
          enable_color: true
          enable_depth: true
          enable_mask: false
          enable_heat_map: true
        - name: side_cam
          width: 1280
          height: 720
          enable_color: true
          enable_depth: true
          enable_mask: false
          enable_heat_map: true
      viewer:
        lookat: [0.04, 0.0, 0.1]
        distance: 0.55
        azimuth: 135
        elevation: -28
        step_delay: 0.03
        hold_seconds: 1.0

backend: auto_atom.backend.mjc.mujoco_backend.build_mujoco_backend

task:
  env_name: mujoco_pick_place_demo
  seed: 42
  # randomization_debug: true
  # Pose randomization applied at each reset.
  # source_block has a free joint so its x/y and yaw are randomised.
  # target_pedestal is a static body (no free joint) — omit it here.
  randomization:
    source_block:
      x: [-0.03, 0.03]
      y: [-0.03, 0.03]
      # yaw: [-0.524, 0.524]   # ±30°
      collision_radius: 0.04
    arm:
      x: [-0.015, 0.015]
      y: [-0.015, 0.015]
      # yaw: [-0.087, 0.087]   # ±5°，模拟安装误差
      collision_radius: 0.15
  stages:
    - name: pick_source
      object: source_block
      operation: pick
      operator: arm
      param:
        pre_move:
          - position: [0.0, 0.0, 0.12]
            orientation: [-0.70710678, 0.70710678, 0.0, 0.0]
            reference: object_world
          - position: [0.0, 0.0, 0.006]
            orientation: [-0.70710678, 0.70710678, 0.0, 0.0]
            reference: object_world
        post_move:
          - position: [0.0, 0.0, 0.2]
            orientation: [-0.70710678, 0.70710678, 0.0, 0.0]
            reference: eef_world
        eef:
          close: true
    - name: place_source
      object: target_pedestal
      operation: place
      operator: arm
      param:
        pre_move:
          - position: [0.0, 0.0, 0.12]
            orientation: [-0.70710678, 0.70710678, 0.0, 0.0]
            reference: object_world
          - position: [0.0, 0.0, 0.058]
            orientation: [-0.70710678, 0.70710678, 0.0, 0.0]
            reference: object_world
        post_move:
          - position: [0.0, 0.0, 0.16]
            orientation: [-0.70710678, 0.70710678, 0.0, 0.0]
            reference: object_world
        eef:
          close: false

operators:
  - name: arm
