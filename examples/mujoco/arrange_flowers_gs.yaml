defaults:
  - arrange_flowers
  - robotiq_gs
  - _self_

gs_dir: assets/gs/scenes/arrange_flowers

env:
  env:
    _target_: auto_atom.basis.gs_mujoco_env.GSUnifiedMujocoEnv
    config:
      _target_: auto_atom.basis.gs_mujoco_env.GSEnvConfig
      model_path: assets/xmls/scenes/arrange_flowers/demo_gs.xml
      cameras:
        - name: front
          width: 640
          height: 480
          enable_color: true
          enable_depth: true
          enable_mask: false
          enable_heat_map: false
      viewer:
        lookat: [0.5, 0.08, 0.13]
        distance: 0.8
        azimuth: 135
        elevation: -28
        # disable: true
      gaussian_render:
        background_ply: assets/gs/backgrounds/example.ply
        body_gaussians:
          vase_gs:   ${gs_dir}/vase.ply
          vase2_gs:  ${gs_dir}/vase2.ply
          flower_gs: ${gs_dir}/flower1.ply
