env:
  _target_: auto_atom.runtime.ComponentRegistry.register_env
  name: stack_color_blocks
  env:
    _target_: auto_atom.basis.mujoco_env.UnifiedMujocoEnv
    config:
      _target_: auto_atom.basis.mujoco_env.EnvConfig
      model_path: assets/xmls/scenes/stack_color_blocks/demo.xml
      operators:
        - name: arm
          arm_actuators: [act_root_x, act_root_y, act_root_z, act_root_rot_z, act_root_rot_y, act_root_rot_x]
          eef_actuators: [fingers_actuator]
          eef_output_name: eef
          pose_site: eef_pose
          imu_acc: imu_acc
          imu_gyro: imu_gyro
          imu_quat: imu_quat
          pose_sensor_pos: global_gripper_pos
          pose_sensor_quat: global_gripper_quat
          tactile_prefixes: ["left_", "right_"]
      enabled_sensors:
        - camera
        - pose
        - tactile
        - joint_position
        - joint_velocity
        - joint_effort
      sim_freq: 500
      update_freq: 20
      mask_objects: ["cube_blue", "cube_orange", "cube_yellow"]
      operations: ["pick", "place", "push", "pull", "press"]
      cameras:
        - name: hand_cam
          width: 640
          height: 480
          enable_color: true
          enable_depth: true
          enable_mask: false
          enable_heat_map: false
          parent_frame: eef_pose
        - name: front_cam
          width: 640
          height: 480
          enable_color: true
          enable_depth: true
          enable_mask: false
          enable_heat_map: false
        - name: side_cam
          width: 640
          height: 480
          enable_color: true
          enable_depth: true
          enable_mask: false
          enable_heat_map: false
      # viewer:
      #   lookat: [0.0, 0.0, 0.1]
      #   distance: 0.6
      #   azimuth: 135
      #   elevation: -28
      #   step_delay: 0.03
      #   hold_seconds: 3.0

backend: auto_atom.backend.mjc.mujoco_backend.build_mujoco_backend

task:
  env_name: stack_color_blocks
  seed: 42
  randomization:
    cube_blue:
      x: [-0.015, 0.015]
      y: [-0.015, 0.015]
      collision_radius: 0.035
    cube_orange:
      x: [-0.015, 0.015]
      y: [-0.015, 0.015]
      collision_radius: 0.035
    cube_yellow:
      x: [-0.015, 0.015]
      y: [-0.015, 0.015]
      collision_radius: 0.035
    arm:
      x: [-0.01, 0.01]
      y: [-0.01, 0.01]
      collision_radius: 0.15
  stages:
    # Stage 1: Pick blue cube
    - name: pick_blue
      object: cube_blue
      operation: pick
      operator: arm
      param:
        pre_move:
          - position: [0.0, 0.0, 0.12]
            orientation: [-0.70710678, 0.70710678, 0.0, 0.0]
            reference: object_world
          - position: [0.0, 0.0, 0.005]
            orientation: [-0.70710678, 0.70710678, 0.0, 0.0]
            reference: object_world
        post_move:
          - position: [0.0, 0.0, 0.2]
            orientation: [-0.70710678, 0.70710678, 0.0, 0.0]
            reference: eef_world
        eef:
          close: true

    # Stage 2: Place blue on orange
    # orange center z=0.085, orange top=0.110
    # blue center when stacked = 0.110 + 0.025 = 0.135
    # offset from orange center = 0.135 - 0.085 = 0.050
    - name: place_blue_on_orange
      object: cube_orange
      operation: place
      operator: arm
      param:
        pre_move:
          - position: [0.0, 0.0, 0.15]
            orientation: [-0.70710678, 0.70710678, 0.0, 0.0]
            reference: object_world
          - position: [0.0, 0.0, 0.05]
            orientation: [-0.70710678, 0.70710678, 0.0, 0.0]
            reference: object_world
        post_move:
          - position: [0.0, 0.0, 0.2]
            orientation: [-0.70710678, 0.70710678, 0.0, 0.0]
            reference: object_world
        eef:
          close: false

    # Stage 3: Pick yellow cube
    - name: pick_yellow
      object: cube_yellow
      operation: pick
      operator: arm
      param:
        pre_move:
          - position: [0.0, 0.0, 0.12]
            orientation: [-0.70710678, 0.70710678, 0.0, 0.0]
            reference: object_world
          - position: [0.0, 0.0, 0.005]
            orientation: [-0.70710678, 0.70710678, 0.0, 0.0]
            reference: object_world
        post_move:
          - position: [0.0, 0.0, 0.2]
            orientation: [-0.70710678, 0.70710678, 0.0, 0.0]
            reference: eef_world
        eef:
          close: true

    # Stage 4: Place yellow on blue (blue is now at z≈0.135, tracked dynamically)
    # Same z-offset logic applies: 0.050
    - name: place_yellow_on_blue
      object: cube_blue
      operation: place
      operator: arm
      param:
        pre_move:
          - position: [0.0, 0.0, 0.15]
            orientation: [-0.70710678, 0.70710678, 0.0, 0.0]
            reference: object_world
          - position: [0.0, 0.0, 0.05]
            orientation: [-0.70710678, 0.70710678, 0.0, 0.0]
            reference: object_world
        post_move:
          - position: [0.0, 0.0, 0.2]
            orientation: [-0.70710678, 0.70710678, 0.0, 0.0]
            reference: object_world
        eef:
          close: false

operators:
  - name: arm
