env:
  _target_: auto_atom.runtime.ComponentRegistry.register_env
  name: press_three_buttons
  env:
    _target_: auto_atom.basis.mujoco_env.UnifiedMujocoEnv
    config:
      _target_: auto_atom.basis.mujoco_env.EnvConfig
      model_path: assets/xmls/scenes/press_three_buttons/demo.xml
      operators:
        - name: arm
          arm_actuators: [act_root_x, act_root_y, act_root_z, act_root_rot_z, act_root_rot_y, act_root_rot_x]
          eef_actuators: [fingers_actuator]
          eef_output_name: eef
          pose_site: eef_pose
          imu_acc: imu_acc
          imu_gyro: imu_gyro
          imu_quat: imu_quat
          pose_sensor_pos: global_gripper_pos
          pose_sensor_quat: global_gripper_quat
          tactile_prefixes: ["left_", "right_"]
      enabled_sensors:
        - camera
        - pose
        - tactile
        - joint_position
        - joint_velocity
        - joint_effort
      sim_freq: 500
      update_freq: 20
      mask_objects: ["button_blue", "button_green", "button_pink"]
      operations: ["push", "press"]
      cameras:
        - name: hand_cam
          width: 640
          height: 480
          enable_color: true
          enable_depth: true
          enable_mask: false
          enable_heat_map: false
          parent_frame: eef_pose
        - name: front_cam
          width: 640
          height: 480
          enable_color: true
          enable_depth: true
          enable_mask: false
          enable_heat_map: false
        - name: side_cam
          width: 640
          height: 480
          enable_color: true
          enable_depth: true
          enable_mask: false
          enable_heat_map: false
      # viewer:
      #   lookat: [0.06, -0.03, 0.1]
      #   distance: 0.6
      #   azimuth: 135
      #   elevation: -28
      #   step_delay: 0.03
      #   hold_seconds: 3.0

backend: auto_atom.backend.mjc.mujoco_backend.build_mujoco_backend

task:
  env_name: press_three_buttons
  seed: 42
  randomization:
    button_blue:
      x: [-0.01, 0.01]
      y: [-0.01, 0.01]
      collision_radius: 0.05
    button_green:
      x: [-0.01, 0.01]
      y: [-0.01, 0.01]
      collision_radius: 0.05
    button_pink:
      x: [-0.01, 0.01]
      y: [-0.01, 0.01]
      collision_radius: 0.05
    arm:
      x: [-0.01, 0.01]
      y: [-0.01, 0.01]
      collision_radius: 0.15
  stages:
    # Stage 1: Press blue button
    # button_blue center z=0.08, cylinder top z=0.10
    # approach z+0.12 above site, descend to z+0.02 (at cylinder top)
    - name: press_blue
      object: button_blue
      operation: press
      operator: arm
      param:
        pre_move:
          - position: [0.0, 0.0, 0.12]
            orientation: [-0.70710678, 0.70710678, 0.0, 0.0]
            reference: object_world
          - position: [0.0, 0.0, 0.035]
            orientation: [-0.70710678, 0.70710678, 0.0, 0.0]
            reference: object_world
        post_move:
          - position: [0.0, 0.0, 0.12]
            orientation: [-0.70710678, 0.70710678, 0.0, 0.0]
            reference: object_world

    # Stage 2: Press green button
    - name: press_green
      object: button_green
      operation: press
      operator: arm
      param:
        pre_move:
          - position: [0.0, 0.0, 0.12]
            orientation: [-0.70710678, 0.70710678, 0.0, 0.0]
            reference: object_world
          - position: [0.0, 0.0, 0.035]
            orientation: [-0.70710678, 0.70710678, 0.0, 0.0]
            reference: object_world
        post_move:
          - position: [0.0, 0.0, 0.12]
            orientation: [-0.70710678, 0.70710678, 0.0, 0.0]
            reference: object_world

    # Stage 3: Press pink button
    - name: press_pink
      object: button_pink
      operation: press
      operator: arm
      param:
        pre_move:
          - position: [0.0, 0.0, 0.12]
            orientation: [-0.70710678, 0.70710678, 0.0, 0.0]
            reference: object_world
          - position: [0.0, 0.0, 0.035]
            orientation: [-0.70710678, 0.70710678, 0.0, 0.0]
            reference: object_world
        post_move:
          - position: [0.0, 0.0, 0.12]
            orientation: [-0.70710678, 0.70710678, 0.0, 0.0]
            reference: object_world

operators:
  - name: arm
    initial_state:
      eef: 0.82  # closed gripper for pressing buttons
