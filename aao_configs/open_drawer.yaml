defaults:
  - basis_mocap_eef
  - _self_

scene_name: open_close_drawer
task_name: open_drawer

env:
  mask_objects: ["handle", "drawer"]
  operations: ["pull"]
  viewer:
    lookat: [0.0, 0.04, 0.12]
    distance: 0.75
    azimuth: 155
    elevation: -22
    step_delay: 0.025
    hold_seconds: 1.0

task:
  stages:
    # Pull the handle to open the drawer.
    # Gripper is horizontal (rot_x=pi/2): points in +Y toward cabinet, fingers in ±Z (one up, one down).
    # EEF site world pos at ctrl start: ~(0, -0.051, 0.15); handle closed: (0, 0.049, 0.132).
    # EEF orientation for horizontal +Y grasp: [-0.5, 0.5, 0.5, 0.5] (x,y,z,w).
    - name: pull_open
      object: handle
      operation: pull
      operator: arm
      param:
        pre_move:
          # Step 1: align with handle height (Z drops from 0.15 to 0.132), stay 10 cm in front
          - position: [0.0, -0.10, 0.0]
            reference: object_world
          # Step 2: advance to grasp position �� EEF at handle center in Y so finger
          #         pads (±42 mm in Z) straddle the handle (±15 mm in Z) and can close on it
          - position: [0.0, 0.0, 0.0]
            reference: object_world
        eef:
          close: true
        post_move:
          # Pull back 12 cm in −Y (world) to fully open the drawer (joint range 0 → −0.12 m)
          - position: [0.0, -0.12, 0.0]
            reference: eef_world
