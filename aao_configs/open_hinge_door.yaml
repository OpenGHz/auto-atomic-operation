defaults:
  - basis_mocap_eef
  - _self_

scene_name: open_close_hinge_door
task_name: open_hinge_door

env:
  env:
    mask_objects: ["handle"]
    operations: ["pull"]
    viewer:
      lookat: [-0.2, 0.0, 0.55]
      distance: 1.5
      azimuth: 290
      elevation: -20
      step_delay: 0.025
      hold_seconds: 1.0

task:
  randomization:
    arm:
      x: [-0.05, 0.05]
      y: [-0.05, 0.05]
      # yaw: [-0.087, 0.087]   # ±5°，模拟安装误差
      collision_radius: 0.15
  stages:
    # Pull handle of hinge_door_1 to swing it open.
    # Door hinge at +Y edge of panel; handle at (-0.05, -0.117, 0) relative to door body.
    # Handle world pos: cabinet(0,0,0) + door(-0.185,0,0.5575) + handle(-0.05,-0.117,0)
    #                 = (-0.235, -0.117, 0.5575)
    # Gripper horizontal (rot_x=pi/2): points +X toward cabinet, fingers in +-Z.
    - name: pull_open
      object: handle
      operation: pull
      operator: arm
      param:
        pre_move:
          # Step 1: align 10 cm in front of handle (-X direction)
          - position: [-0.10, 0.0, 0.0]
            reference: object_world
          # Step 2: advance to handle grasp position
          - position: [0.0, 0.0, 0.0]
            reference: object_world
        eef:
          close: true
        post_move:
          # Arc move: rotate gripper around the door hinge by -1.5 rad (~85 deg).
          # pivot references hinge_joint_1 by name — its world position is resolved
          # automatically from the MuJoCo XML at runtime.
          - arc:
              pivot: hinge_joint_1
              axis: [0, 0, 1]
              angle: -1.57
              # For smooth simulation, we set a max step for the arc.
              max_step: 0.1
              # absolute: true
            reference: world
