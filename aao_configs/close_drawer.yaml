defaults:
  - base
  - _self_

env:
  name: close_drawer
  env:
    config:
      model_path: assets/xmls/scenes/open_close_drawer/demo.xml
      initial_joint_positions:
        drawer_slide: -0.12
      mask_objects: ["handle", "drawer"]
      operations: ["pull"]
      viewer:
        lookat: [0.0, 0.04, 0.12]
        distance: 0.75
        azimuth: 155
        elevation: -22
        step_delay: 0.025
        hold_seconds: 1.0

task:
  env_name: close_drawer
  stages:
    # Grasp the handle and push the drawer closed.
    # Drawer starts fully open: joint=-0.12 m, handle world pos = (0, -0.071, 0.132).
    # Gripper is horizontal (rot_x=pi/2): points in +Y toward cabinet, fingers in ±Z.
    # EEF orientation for horizontal +Y grasp: [-0.5, 0.5, 0.5, 0.5] (x,y,z,w).
    - name: push_close
      object: handle
      operation: pull
      operator: arm
      param:
        pre_move:
          # Step 1: align with handle height, stay 10 cm in front
          - position: [0.0, -0.10, 0.0]
            orientation: [-0.5, 0.5, 0.5, 0.5]
            reference: object_world
          # Step 2: advance to grasp position — EEF at handle center in Y
          - position: [0.0, 0.0, 0.0]
            reference: object_world
        eef:
          close: true
        post_move:
          # Push forward 12 cm in +Y (world) to fully close the drawer (joint range −0.12 → 0)
          - position: [0.0, 0.12, 0.0]
            reference: eef_world
