defaults:
  - basis_xf9600
  - _self_

env:
  # Inject the Airbot Play arm + G2P gripper into the composable scene.
  robot_paths:
    - ${assets_dir}/xmls/robots/airbot_play_with_g2p.xml
  # Home pose is all-zero (matches the legacy <key name="home"> qpos)
  # so no initial_joint_positions entries are needed for the arm; qpos0
  # defaults suffice. Task-specific homes can still override.
  operators:
    arm:
      arm_actuators:
        - joint1
        - joint2
        - joint3
        - joint4
        - joint5
        - joint6
      eef_actuators: [eef_claw_joint]
      eef_output_name: gripper
      eef_mapper:
        _target_: auto_atom.mappers.finger_distance.FingerDistanceMapper
        left_pad_geom: eef_left_finger_pad_upper
        right_pad_geom: eef_right_finger_pad_upper
        actuator_name: eef_claw_joint
      pose_site: eef_pose
      root_body: arm_base
      ik_factory: auto_atom.backend.mjc.ik.airbot_kdl_ik_solver.AirbotKdlIKSolver
      ik_params:
        arm_base_body: arm_base
        tcp_site_name: eef_pose
        arm_type: play_short
        eef_type: none

backend: auto_atom.backend.mjc.ik.airbot_kdl_ik_solver.build_airbot_play_xf9600_backend
