defaults:
  - basis_mocap_eef
  - _self_

scene_name: wipe_the_table

env:
  # mask_objects: ["blue_duck", "chicken_doll", "transparent_tape_paper", "white_box"]
  mask_objects: ["blue_duck", "white_box"]
  operations: ["pick", "place"]

task:
  randomization:
    blue_duck:
      x: [-0.01, 0.01]
      y: [-0.01, 0.01]
      collision_radius: 0.05
    # chicken_doll:
    #   x: [-0.01, 0.01]
    #   y: [-0.01, 0.01]
    #   collision_radius: 0.05
    # transparent_tape_paper:
    #   x: [-0.01, 0.01]
    #   y: [-0.01, 0.01]
    #   collision_radius: 0.05
    arm:
      x: [-0.01, 0.01]
      y: [-0.01, 0.01]
      collision_radius: 0.15
  stages:
    # Stage 1: Pick blue duck
    # blue_duck col half-height=0.026, center z=0.12
    - name: pick_blue_duck
      object: blue_duck
      operation: pick
      operator: arm
      param:
        pre_move:
          - position: [0.0, 0.0, 0.12]
            reference: object_world
          - position: [0.0, 0.0, 0.001]
            reference: object_world
        post_move:
          - position: [0.0, 0.0, 0.2]
            reference: eef_world
        eef:
          close: true

    # Stage 2: Place blue duck into white box
    # white_box center z=0.09, col half-height=0.07 → top z≈0.16
    # place offset from box center = 0.10 (above box rim)
    - name: place_blue_duck_in_box
      object: white_box
      operation: place
      operator: arm
      param:
        pre_move:
          - position: [0.0, 0.05, 0.20]
            reference: object_world
          - position: [0.0, 0.05, 0.15]
            reference: object_world
        post_move:
          - position: [0.0, 0.05, 0.20]
            reference: object_world
        eef:
          close: false

