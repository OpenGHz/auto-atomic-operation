defaults:
  - open_door_airbot_play_g2p
  - airbot_play_gs
  - airbot_g2p_gs
  - _self_

door_name: door19
knob_name: knob1
lock_name: lock1
bg3dgs_name: null
bg3dgs_dir: ${assets_dir}/gs/backgrounds/door_bg/

env:
  _target_: auto_atom.basis.mjc.gs_mujoco_env.BatchedGSUnifiedMujocoEnv
  gaussian_render:
    body_gaussians:
      door_body: ${gs_dir}/${door_name}_${knob_name}.ply
      handle_gs_frame: ${gs_dir}/real_${knob_name}.ply
      lock_gs_frame: ${gs_dir}/real_${lock_name}.ply
      # bg_gs_frame: ${assets_dir}/gs/backgrounds/door_bg/${bg3dgs_name}.ply
    background_ply: ${bg3dgs_dir}/bg*.ply
    # Original bg_gs_frame body pose from demo_gs_airbot_play.xml (wxyz→xyzw):
    # pos=[-0.105, 0.491151190, -0.136037800]
    # quat(wxyz)=[0.509794620, -0.516845570, 0.495912190, -0.476498890]
    # (7-float form: [x, y, z, qx, qy, qz, qw])
    background_transform:
      [
        -0.035,
        0.491151190,
        -0.1360378,
        -0.51684557,
        0.495912190,
        -0.47649889,
        0.509794620,
      ]
    # Flip the background 180° about the door's central vertical axis
    # (world z through the door-panel geometric centre at x=1.54, y=0.55)
    # so the "indoor" room ends up on the other side of the door —
    # looking from the robot's side the scene now reads as outdoor.
    #   position: point-symmetric in (x, y) about (1.54, 0.55), z unchanged
    #   orientation: left-multiplied by q_180z (xyzw=[0,0,1,0])
    # background_transform: [3.185, 0.608849, -0.136038, -0.495912, -0.516846, 0.509795, 0.476499]
