defaults:
  - basis_p7_xf9600
  - _self_

scene_name: open_door
model_name: demo_p7_xf9600
task_name: open_door_p7_ik

env:
  sim_freq: 1000
  update_freq: 100
  mask_objects: ["handle_lever_body"]
  operations: ["push"]
  pre_step_callbacks:
    - _target_: auto_atom.callbacks.door_latch.DoorLatchCallback
      door_joint: door_hinge
      handle_joint: handle_hinge
      kp: 80.0
      kd: 8.0
      unlock_threshold: 0.12
      lock_zone: 0.05
  viewer:
    lookat: [1.45, 0.12, 0.8]
    distance: 1.2
    azimuth: 210
    elevation: -18
    step_delay: 0.005
    hold_seconds: 0.5

task:
  stages:
    - name: grasp_and_open
      object: handle_body_phys
      operation: push
      operator: arm
      param:
        pre_move:
          # 1. Approach: ~14cm in front of handle (relative to handle_body_phys)
          - position: [-0.14, 0.0955, -0.015]
            reference: object_world
            orientation: [0.68997457, 0.19902274, -0.20541703, 0.66492774]
            max_linear_step: 0.04
            max_angular_step: 0.25
          # 2. Grasp position: ~7cm in front of handle
          - position: [-0.07, 0.1155, -0.015]
            reference: object_world
            orientation: [0.68997457, 0.19902274, -0.20541703, 0.66492774]
            max_linear_step: 0.04
            max_angular_step: 0.2
        eef:
          close: true
        post_move:
          # 3. Rotate handle to unlock (arc around handle_hinge)
          #    World axis = [-1,0,0] (local Y becomes world -X after door frame 90deg rotation)
          #    Positive angle = press handle down = unlock
          - arc:
              pivot: handle_hinge
              axis: [-1, 0, 0]
              angle: 0.45
              absolute: true
              max_step: 0.15
            reference: world
          # 4. Push door open (arc around door_hinge)
          #    World axis = [0,0,-1] (same as local axis)
          #    Negative angle = open door
          #    -0.35 rad ≈ 20° — within P7 arm reachable workspace
          - arc:
              pivot: door_hinge
              axis: [0, 0, -1]
              angle: -0.35
              absolute: true
              max_step: 0.15
            reference: world
          # 5. Retreat upward from current position
          # - position: [0.0, 0.0, 0.10]
          #   reference: eef_world
          #   orientation: [0.68997457, 0.19902274, -0.20541703, 0.66492774]
          #   max_linear_step: 0.03
          #   max_angular_step: 0.25

task_operators:
  - name: arm
    control:
      timeout_steps: 3000
      cartesian_max_linear_step: 0.025
      cartesian_max_angular_step: 0.3
      tolerance:
        position: 0.008
        orientation: 0.10
        eef: 0.012
    ik:
      joint_control_mode: per_step_ik
      max_joint_delta: 0.35
