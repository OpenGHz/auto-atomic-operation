defaults:
  - basis_p7_xf9600
  - _self_

scene_name: open_door
model_name: demo_p7_xf9600
task_name: open_door_p7_ik

env:
  sim_freq: 1000
  update_freq: 100
  mask_objects: ["handle_lever_body", "handle_body_phys"]
  operations: ["push"]
  pre_step_callbacks:
    - _target_: auto_atom.callbacks.door_latch.DoorLatchCallback
      door_joint: door_hinge
      handle_joint: handle_hinge
      kp: 80.0
      kd: 8.0
      unlock_threshold: 0.20
      lock_zone: 0.05
  viewer:
    lookat: [1.45, 0.12, 0.8]
    distance: 1.2
    azimuth: 210
    elevation: -18
    step_delay: 0.005
    hold_seconds: 0.5

task:
  stages:
    - name: grasp_and_open
      object: handle_body_phys
      operation: push
      operator: arm
      param:
        pre_move:
          # 1. Approach: in front of handle lever
          - position: [1.350, 0.316, -0.19]
            reference: world
            orientation: [-0.19902274, 0.68997457, -0.66492774, -0.20541703]
            max_linear_step: 0.04
            max_angular_step: 0.25
          # 2. Grasp position: TCP aligned so finger pads straddle
          #    the handle lever (front capsule at world ~[1.41, 0.31, -0.20])
          - position: [1.420, 0.336, -0.19]
            reference: world
            orientation: [-0.19902274, 0.68997457, -0.66492774, -0.20541703]
            max_linear_step: 0.04
            max_angular_step: 0.2
        eef:
          close: true
        post_move:
          - position: [1.420, 0.336, -0.24]
            reference: world
            orientation: [-0.19902274, 0.68997457, -0.66492774, -0.20541703]
            max_linear_step: 0.015
            max_angular_step: 0.2
          - position: [1.6, 0.336, -0.24]
            reference: world
            orientation: [-0.19902274, 0.68997457, -0.66492774, -0.20541703]
            max_linear_step: 0.02
            max_angular_step: 0.3
          # 3. Rotate handle to unlock (arc around handle_hinge Y-axis)
          # - arc:
          #     pivot: handle_hinge
          #     axis: [0, 1, 0]
          #     angle: 0.45
          #     absolute: true
          #     max_step: 0.15
          #   reference: world
        #   # 4. Push door open (arc around door_hinge)
        #   - arc:
        #       pivot: door_hinge
        #       axis: [0, 0, -1]
        #       angle: -0.50
        #       absolute: true
        #       max_step: 0.15
        #     reference: world
          # 5. Retreat
          # - position: [1.30, 0.40, -0.17]
          #   reference: world
          #   orientation: [-0.19902274, 0.68997457, -0.66492774, -0.20541703]
          #   max_linear_step: 0.03
          #   max_angular_step: 0.25

task_operators:
  - name: arm
    control:
      timeout_steps: 3000
      cartesian_max_linear_step: 0.025
      cartesian_max_angular_step: 0.3
      tolerance:
        position: 0.008
        orientation: 0.10
        eef: 0.012
    ik:
      joint_control_mode: per_step_ik
      max_joint_delta: 0.35
