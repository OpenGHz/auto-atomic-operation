defaults:
  - basis_p7_g2p
  - _self_


scene_name: cup_on_coaster
task_name: airbot_p7_cup_on_coaster
model_name: demo
max_updates: 650

env:
  # demo.xml 只定义了 env0_cam / env1_cam,覆盖 basis_xf9600 的 env2_cam
  cameras:
    - name: eef_wrist_cam
      width: ${cam_width}
      height: ${cam_height}
      enable_color: ${enable_color}
      enable_depth: ${enable_depth}
      enable_mask: ${enable_mask}
      enable_heat_map: ${enable_heat_map}
      parent_frame: eef_pose
      is_static: false
    - name: env0_cam
      width: ${cam_width}
      height: ${cam_height}
      enable_color: ${enable_color}
      enable_depth: ${enable_depth}
      enable_mask: ${enable_mask}
      enable_heat_map: ${enable_heat_map}
      is_static: true
    - name: env1_cam
      width: ${cam_width}
      height: ${cam_height}
      enable_color: ${enable_color}
      enable_depth: ${enable_depth}
      enable_mask: ${enable_mask}
      enable_heat_map: ${enable_heat_map}
      is_static: true
  sim_freq: 1000
  update_freq: 100
  mask_objects: ["cup", "coaster"]
  operations: ["pick", "place"]
  viewer:
    # 沿用 cup_on_coaster_gs.yaml 的观察视角
    lookat: [0.45, 0.05, 0.08]
    distance: 0.8
    azimuth: 135
    elevation: -28
    step_delay: 0.005
    hold_seconds: 0.5

task:
  # cup / coaster 随机化范围原封沿用 cup_on_coaster.yaml，不做收窄：
  # P7 基座通过下面的 task_operators.arm.initial_state.base_pose 在 YAML 中调整。
  randomization:
    cup:
      x: [0.15, 0.25]
      y: [-0.1, 0]
      collision_radius: 0.04
      reference: absolute_world
    coaster:
      x: [0.20, 0.30]
      y: [0.05, 0.1]
      collision_radius: 0.04
      reference: absolute_world

  stages:
    # --- Stage 1: 从上方垂直下压夹取 cup ---
    - name: pick_cup
      object: cup
      operation: pick
      operator: arm
      param:
        pre_move:
          # 1. cup 中心正上方 0.12 m（cup_on_coaster.yaml 原值）。
          #    pitch=90° 夹爪指向下方。
          - position: [0.0, 0.0, 0.20]
            orientation: [0.70710678, 0.0, -0.70710678, 0.0]
            reference: object_world
            max_linear_step: 0.04
            max_angular_step: 0.35
          # 2. 下降到 cup 中心上方 0.04 m（即贴近杯顶 z=0.045）。
          #    eef 在杯顶,夹爪指尖往下抓杯身上缘,掌部高于杯顶不再穿模。
          - position: [0.0, 0.0, 0.01]
            orientation: [0.70710678, 0.0, -0.70710678, 0.0]
            reference: object_world
            max_linear_step: 0.04
            max_angular_step: 0.2
        eef:
          close: true
        post_move:
          # 3. 夹紧后向上抬 0.10 m（cup_on_coaster.yaml 原值）。
          #    eef_world 快照解耦被夹 cup 的微动对 IK 目标的拖拽。
          - position: [0.0, 0.0, 0.03]
            orientation: [0.70710678, 0.0, -0.70710678, 0.0]
            reference: eef_world
            max_linear_step: 0.02
            max_angular_step: 0.1

    # --- Stage 2: 把 cup 放到 coaster 上方并松爪 ---
    - name: place_cup
      object: coaster
      operation: place
      operator: arm
      param:
        pre_move:
          # 1. coaster 正上方 0.10 m 巡航点（cup_on_coaster.yaml 原值）。
          - position: [0.0, 0.0, 0.10]
            orientation: [0.70710678, 0.0, -0.70710678, 0.0]
            reference: object_world
            max_linear_step: 0.05
            max_angular_step: 0.25
          # 2. 下降到 coaster 中心上方 0.04 m（cup_on_coaster.yaml 原值）。
          #    coaster 顶 z=0.085、cup_col 半高 0.04 + body 内 +0.005 偏移
          #    → 杯 body 落点 z≈0.12，松爪后靠重力坐落。
          - position: [0.0, 0.0, 0.07]
            orientation: [0.70710678, 0.0, -0.70710678, 0.0]
            reference: object_world
            max_linear_step: 0.05
            max_angular_step: 0.2
        eef:
          close: false
        post_move:
          # 3. 松爪后退离 0.18 m（cup_on_coaster.yaml 原值，同样保持
          #    object_world 参考）。
          - position: [0.0, 0.0, 0.18]
            orientation: [0.70710678, 0.0, -0.70710678, 0.0]
            reference: object_world
            max_linear_step: 0.05
            max_angular_step: 0.25
        # placed_tolerance 原封沿用 cup_on_coaster.yaml —— null 表示
        # 跳过该轴校验，接受任意姿态只要位置满足外层 tolerance 即可。
        placed_tolerance:
          position: [null, null, null]
          orientation: [null, null, null]

task_operators:
  arm:
    initial_state:
      base_pose:
        position: [0.50, 0.0, 0.15]
        orientation: [0.0, 0.0, -1, 0]
      eef: 0.0
    control:
      timeout_steps: 220
      cartesian_max_linear_step: 0.025
      cartesian_max_angular_step: 0.3
      tolerance:
        position: 0.008
        orientation: 0.10
        eef: 0.001
    max_joint_delta: 0.35
    ik:
      joint_control_mode: per_step_ik
