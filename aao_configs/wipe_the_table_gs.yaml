defaults:
  - wipe_the_table
  - robotiq_gs
  - gs_mixin
  - _self_

env:
  env:
    viewer:
      lookat: [0.45, 0.0, 0.1]
      distance: 1.0
      azimuth: 135
      elevation: -28
    gaussian_render:
      body_gaussians:
        blue_duck_gs: ${gs_dir}/blue_duck.ply
        chicken_doll_gs: ${gs_dir}/chicken_doll.ply
        dog_gs: ${gs_dir}/dog.ply
        white_box_gs: ${gs_dir}/box.ply
        yellow_brush_gs: ${gs_dir}/yellow_brush.ply
        transparent_tape_paper_gs: ${gs_dir}/transparent_tape_paper.ply
