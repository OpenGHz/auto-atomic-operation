# Shared Airbot Play + XF9600 gripper GS body gaussians config.
# Include via Hydra defaults in any *_gs.yaml that uses this robot.

assets_dir: assets
eef_gs_dir: ${assets_dir}/gs/robots/airbot_g2p

env:
  gaussian_render:
    body_gaussians:
      eef_umi_base_link: ${eef_gs_dir}/base_link.ply
      eef_umi_claw: ${eef_gs_dir}/claw.ply
      eef_umi_l11: ${eef_gs_dir}/l11.ply
      eef_umi_l12: ${eef_gs_dir}/l12.ply
      eef_umi_l21: ${eef_gs_dir}/l21.ply
      eef_umi_l22: ${eef_gs_dir}/l22.ply
      eef_umi_l23: ${eef_gs_dir}/l23.ply
      eef_umi_l31: ${eef_gs_dir}/l31.ply
      eef_umi_l32: ${eef_gs_dir}/l32.ply
      eef_umi_l41: ${eef_gs_dir}/l41.ply
      eef_umi_l42: ${eef_gs_dir}/l42.ply
      eef_umi_l51: ${eef_gs_dir}/l51.ply
      eef_umi_l52: ${eef_gs_dir}/l52.ply
      eef_umi_l53: ${eef_gs_dir}/l53.ply
      eef_umi_l61: ${eef_gs_dir}/l61.ply
      eef_umi_l62: ${eef_gs_dir}/l62.ply
      eef_left_tactile: ${eef_gs_dir}/left_tactile.ply
      eef_right_tactile: ${eef_gs_dir}/right_tactile.ply
