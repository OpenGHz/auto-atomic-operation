defaults:
  - basis
  - _self_

env:
  cameras:
    - name: xfg_left_cam
      width: ${cam_width}
      height: ${cam_height}
      enable_color: ${enable_color}
      enable_depth: ${enable_depth}
      enable_mask: ${enable_mask}
      enable_heat_map: ${enable_heat_map}
      parent_frame: eef_pose
      is_static: false
    - name: xfg_right_cam
      width: ${cam_width}
      height: ${cam_height}
      enable_color: ${enable_color}
      enable_depth: ${enable_depth}
      enable_mask: ${enable_mask}
      enable_heat_map: ${enable_heat_map}
      parent_frame: eef_pose
      is_static: false
    - name: front_cam
      width: ${cam_width}
      height: ${cam_height}
      enable_color: ${enable_color}
      enable_depth: ${enable_depth}
      enable_mask: ${enable_mask}
      enable_heat_map: ${enable_heat_map}
      is_static: true
    - name: side_cam
      width: ${cam_width}
      height: ${cam_height}
      enable_color: ${enable_color}
      enable_depth: ${enable_depth}
      enable_mask: ${enable_mask}
      enable_heat_map: ${enable_heat_map}
      is_static: true
