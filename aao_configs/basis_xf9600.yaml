      width: ${cam_width}
      height: ${cam_height}
      enable_color: ${enable_color}
      enable_depth: ${enable_depth}
      enable_mask: ${enable_mask}
      enable_heat_map: ${enable_heat_map}
      is_static: true
    - name: env0_cam
      width: ${cam_width}
      height: ${cam_height}
      enable_color: ${enable_color}
      enable_depth: ${enable_depth}
      enable_mask: ${enable_mask}
      enable_heat_map: ${enable_heat_map}
      is_static: true

task:
  randomization:
    arm:
      eef:
        x: [ -0.0, 0.0 ]
        y: [ -0.0, 0.0 ]
        z: [ -0.0, 0.0 ]
        collision_radius: 0.15
