defaults:
  - common_vars

model_name: demo
task_name: ${scene_name}

env:
  _target_: auto_atom.basis.mjc.mujoco_env.BatchedUnifiedMujocoEnv
  name: ${task_name}
  model_path: ${assets_dir}/xmls/scenes/${scene_name}/${model_name}.xml
  batch_size: 2
  enabled_sensors:
    - camera
    - pose
    - tactile
    - joint_position
    - joint_velocity
    - joint_effort
  sim_freq: 600
  update_freq: 30
  cameras:
    - name: wrist_cam
      width: ${cam_width}
      height: ${cam_height}
      enable_color: ${enable_color}
      enable_depth: ${enable_depth}
      enable_mask: ${enable_mask}
      enable_heat_map: ${enable_heat_map}
      parent_frame: eef_pose
      is_static: false
    - name: env1_cam
      width: ${cam_width}
      height: ${cam_height}
      enable_color: ${enable_color}
      enable_depth: ${enable_depth}
      enable_mask: ${enable_mask}
      enable_heat_map: ${enable_heat_map}
      is_static: true
    - name: env0_cam
      width: ${cam_width}
      height: ${cam_height}
      enable_color: ${enable_color}
      enable_depth: ${enable_depth}
      enable_mask: ${enable_mask}
      enable_heat_map: ${enable_heat_map}
      is_static: true
  # structured: true
  heatmap_operations: ["pick", "place", "push", "pull", "press"]

backend: auto_atom.backend.mjc.mujoco_backend.build_mujoco_backend

task:
  env_name: ${task_name}
  seed: 42
  randomization:
    arm:
      eef:
        x: [-0.3, 0.35]
        y: [-0.32, 0.10]
        z: [-0.0, 0.2]
        collision_radius: 0.15
  # camera_randomization:
  #   env0_cam:
  #     reference: absolute_world
  #     x: [0.8, 1.0]
  #     y: [-0.1, 0.1]
  #     z: [0.4, 0.6]
  #   env1_cam:
  #     x: [-0.05, 0.05]
  #     y: [-0.05, 0.05]
  #     pitch: [-0.1, 0.1]
task_operators:
  arm: {}
