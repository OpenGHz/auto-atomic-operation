# Shared Robotiq 2F-85 GS body gaussians config.
# Include via Hydra defaults in any *_gs.yaml that uses the Robotiq gripper.

assets_dir: assets
robot_gs_dir: ${assets_dir}/gs/robots/robotiq

env:
  gaussian_render:
    body_gaussians:
      robotiq_interface: ${robot_gs_dir}/base.ply
      robotiq_base: ${robot_gs_dir}/robotiq_base.ply
      left_driver: ${robot_gs_dir}/left_driver.ply
      left_coupler: ${robot_gs_dir}/left_coupler.ply
      left_spring_link: ${robot_gs_dir}/left_spring_link.ply
      left_follower: ${robot_gs_dir}/left_follower.ply
      right_driver: ${robot_gs_dir}/right_driver.ply
      right_coupler: ${robot_gs_dir}/right_coupler.ply
      right_spring_link: ${robot_gs_dir}/right_spring_link.ply
      right_follower: ${robot_gs_dir}/right_follower.ply
