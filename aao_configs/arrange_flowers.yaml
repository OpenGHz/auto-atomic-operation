defaults:
  - basis_mocap_eef
  - _self_

scene_name: arrange_flowers

env:
  mask_objects: ["flower", "vase2"]
  operations: ["pick", "place"]
  update_freq: 15
  viewer:
    lookat: [0.04, 0.0, 0.1]
    distance: 0.55
    azimuth: 135
    elevation: -28
    step_delay: 0.03
    hold_seconds: 1.0
    # disable: true

task:
  randomization:
    vase:
      x: [0.22, 0.58]
      y: [-0.32, 0.27]
      collision_radius: 0.04
      reference: absolute_world
    flower:
      x: [-0.005, 0.005]
      y: [-0.005, 0.005]
      collision_radius: 0.04
      reference: vase
    vase2:
      x: [0.22, 0.58]
      y: [-0.32, 0.27]
      collision_radius: 0.04
      reference: absolute_world
  stages:
    # Stage 1: Pick flower
    # flower center z≈0.19, mesh collision extends ~3cm from center
    # grasp offset must clear the mesh to satisfy position_tolerance
    - name: pick_flower
      object: flower
      operation: pick
      operator: arm
      param:
        pre_move:
          - position: [-0.03, -0.03, 0.135]
            # orientation: [0.0, 0.70710678, 0.0, 0.70710678]
            rotation: [0.0, 1.5708, 0.7853]
            reference: object
          - position: [-0.03, -0.03, 0.035]
            reference: object_world
        post_move:
          - position: [0.0, 0.0, 0.25]
            reference: eef_world
        eef:
          close: true

    # Stage 2: Place flower into vase2
    # vase2 center z=0.13, opening is near the top (~z=0.20)
    # offset from vase2 center to insertion point ≈ 0.08
    - name: place_flower
      object: vase2
      operation: place
      operator: arm
      param:
        pre_move:
          - position: [0.05, 0.0, 0.3]
            reference: object_world
          - position: [0.05, 0.0, 0.13]
            reference: object_world
        post_move:
          - position: [0.05, 0.0, 0.2]
            reference: object_world
        eef:
          close: false
