defaults:
  - basis_mocap_eef
  - _self_

scene_name: open_door
task_name: open_door

env:
  mask_objects: ["handle_lever_body", "handle_body_phys"]
  operations: ["pick", "push"]
  viewer:
    lookat: [1.45, 0.12, 0.8]
    distance: 1.2
    azimuth: 210
    elevation: -18
    step_delay: 0.025
    hold_seconds: 1.0

task:
  stages:
    - name: rotate_handle
      object: handle_lever_body
      operation: pick
      operator: arm
      param:
        pre_move:
          - position: [0.095, 0.106, 0.0]
            reference: object
            max_linear_step: 0.02
            max_angular_step: 0.25
          - position: [0.095, 0.055, 0.0]
            reference: object
            max_linear_step: 0.01
            max_angular_step: 0.2
        eef:
          close: true
        post_move:
          - arc:
              pivot: handle_hinge
              axis: [0, 1, 0]
              angle: 0.45
              absolute: true
              max_step: 0.03
            reference: world
    - name: push_open
      object: handle_body_phys
      operation: push
      operator: arm
      param:
        pre_move:
          - position: [0.0, 0.0, 0.0]
            reference: eef_world
            max_linear_step: 0.01
            max_angular_step: 0.15
        post_move:
          - arc:
              pivot: handle_hinge
              axis: [0, 1, 0]
              angle: 0.55
              absolute: true
              max_step: 0.03
            reference: world
          - arc:
              pivot: door_hinge
              axis: [0, 0, -1]
              angle: -1.2
              absolute: true
              max_step: 0.04
            reference: world

operators:
  - name: arm
    control:
      cartesian_max_linear_step: 0.015
      cartesian_max_angular_step: 0.2
