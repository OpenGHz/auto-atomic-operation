# @package _global_

hydra:
  job:
    env_set:
      # set environment variables for Graphics Library
      EGL_VISIBLE_DEVICES: ${oc.env:CUDA_VISIBLE_DEVICES}
      MUJOCO_EGL_DEVICE_ID: ${oc.env:CUDA_VISIBLE_DEVICES}
      EGL_PLATFORM: egl
      MUJOCO_GL: egl
      PYOPENGL_PLATFORM: egl
      __EGL_VENDOR_LIBRARY_FILENAMES: /usr/share/glvnd/egl_vendor.d/10_nvidia.json
      LD_PRELOAD: /usr/lib/x86_64-linux-gnu/libEGL_nvidia.so.0
      NVIDIA_DRIVER_CAPABILITIES: all
