defaults:
  - basis_mocap_eef
  - _self_

scene_name: pick_and_place

env:
  mask_objects: ["source_block", "target_pedestal"]
  operations: ["pick", "place"]
  viewer:
    lookat: [0.04, 0.0, 0.1]
    distance: 0.55
    azimuth: 135
    elevation: -28
    step_delay: 0.03
    hold_seconds: 1.0

task:
  # randomization_debug: true
  # Pose randomization applied at each reset.
  # source_block has a free joint so its x/y and yaw are randomised.
  # target_pedestal is a static body (no free joint) — omit it here.
  randomization:
    source_block:
      x: [-0.03, 0.03]
      y: [-0.03, 0.03]
      # yaw: [-0.524, 0.524]   # ±30°
      collision_radius: 0.04
  stages:
    - name: pick_source
      object: source_block
      operation: pick
      operator: arm
      param:
        pre_move:
          - position: [0.0, 0.0, 0.12]
            orientation: [0.0, 0.70710678, 0.0, 0.70710678]
            reference: object_world
          - position: [0.0, 0.0, 0.006]
            reference: object_world
        post_move:
          - position: [0.0, 0.0, 0.2]
            reference: eef_world
        eef:
          close: true
    - name: place_source
      object: target_pedestal
      operation: place
      operator: arm
      param:
        pre_move:
          - position: [0.0, 0.0, 0.12]
            reference: object_world
          - position: [0.0, 0.0, 0.066]
            reference: object_world
        post_move:
          - position: [0.0, 0.0, 0.16]
            reference: object_world
        eef:
          close: false
