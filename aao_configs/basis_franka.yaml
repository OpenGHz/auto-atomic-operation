# Base configuration for Franka Panda + Robotiq tasks (IK joint-space control)
# Inherits common structure from base.yaml but overrides operator bindings
# for a fixed-base arm with 7 position actuators.

defaults:
  - basis

env:
  operators:
    - name: arm
      arm_actuators:
        - actuator1
        - actuator2
        - actuator3
        - actuator4
        - actuator5
        - actuator6
        - actuator7
      eef_actuators: [fingers_actuator]
      eef_output_name: eef
      pose_site: eef_pose
      tactile_prefixes: ["left_", "right_"]

backend: auto_atom.backend.mjc.ik.mink_ik_solver.build_franka_backend

task_operators:
  - name: arm
    max_joint_delta: 1.8 # max per-joint displacement per control step (rad)
    ik:
      joint_control_mode: solve_once_interpolate # per_step_ik | solve_once_interpolate
      joint_interp_speed: 0.1 # max per-joint delta (rad) per control step during interpolation
      n_iterations: 300 # IK integration steps per solve
      dt: 0.1 # virtual timestep per IK step (s)
      position_cost: 1.0 # EEF position tracking weight
      orientation_cost: 1.0 # EEF orientation tracking weight
      posture_cost: 1e-4 # joint posture regularization weight
