# defaults:
#   - _self_
#   - bg3dgs: background_1

model_name: demo_gs
bg3dgs_name: background_1

env:
  _target_: auto_atom.basis.mjc.gs_mujoco_env.BatchedGSUnifiedMujocoEnv
  viewer:
    lookat: [0.5, 0.08, 0.13]
    distance: 0.8
    azimuth: 135
    elevation: -28
    # disable: true
  gaussian_render:
    background_ply: ${assets_dir}/gs/backgrounds/${bg3dgs_name}.ply
    # Initial recommended offsets were estimated by:
    # 1) extracting the densest near-horizontal plane around the background's
    #    likely tabletop height from the PLY,
    # 2) estimating that plane's center,
    # 3) aligning it to the repo's common GS tabletop reference
    #    (table center ~= [0.45, 0.06], table top z ~= 0.0742).
    # These are intended as good starting points and may still need small
    # per-scene visual refinement with replay/compare tools.
    # Per-background pose transforms.
    # Values: [x, y, z] (pure translation) or
    # [x, y, z, qx, qy, qz, qw] (full rigid-body transform).
    background_transforms:
      background_0: [1.176, -0.0027, -0.01] # the heatmap is not good, which can be solved by lowering the table's height, but the object will appear to float.
      background_1: [0.0, 0.0, 0.0]
      discover-lab2: [0.2839, 0.0888, 0.0745]
      hospital_table_25_5: [0.5158, -0.6083, 0.0755] # the bg itself looks not so good
      simple_room: [-0.0248, 0.1106, 0.0736]
      table: [-0.1354, -0.3838, 0.0709]
    # Optional: apply rigid transforms to individual per-body PLYs at load
    # time. Useful when the physical MuJoCo body pose is correct but the
    # reconstructed GS asset needs an extra local correction.
    # - `position`: [x, y, z] translation in local GS coords
    # - `orientation`: [qx, qy, qz, qw] or [roll, pitch, yaw]
    # - `center`: optional pivot point for the rotation
    # - `share_center_with`: reuse another body's centroid as the pivot
    # Transform is applied before `body_mirrors`.
    # body_transforms:
    #   door_gs:
    #     orientation: [0, 0, 1, 0]
    #     center: [0.0, 0.0, 0.0]
    # Optional: reflect individual per-body PLYs across a plane at load time.
    # Keys must match entries in `body_gaussians` (defined in task-specific
    # configs, not here). Mirrored PLYs are cached under
    # `.cache/gs_body_mirrors/`. Two ways to specify the reflection-plane
    # normal:
    #   A) `axis`: unit vector in the PLY's local (GS) coords (simplest when
    #      the PLY is pre-rotated so body quat = identity).
    #   B) `body_quat` (wxyz) + `body_axis`: the code computes
    #      `gs_axis = R(body_quat)^T @ body_axis`. Use when the body has a
    #      non-identity MuJoCo quaternion and you want to mirror along a
    #      body-frame direction.
    # The mirror-plane center defaults to the PLY centroid. Use `center`
    # (explicit [x, y, z] in GS coords) or `share_center_with` (another
    # body key, to keep paired objects aligned — e.g. door + knob).
    # body_mirrors:
    #   door_gs:
    #     axis: [1, 0, 0]
    #   door_knob_gs:
    #     axis: [1, 0, 0]
    #     share_center_with: door_gs
